{% extends "base.html" %}

{% block title %}
Complete Registration
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center">

Complete Registration

</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
value="{{ email }}"
readonly>

</div>

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Create Account

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
