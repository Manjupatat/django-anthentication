
{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body p-4">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-warning w-100">

                        Send OTP

                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
